<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#1e0f45"/>
      <stop offset="55%" stop-color="#0e0820"/>
      <stop offset="100%" stop-color="#06040f"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e6a3"/>
      <stop offset="35%" stop-color="#d4af37"/>
      <stop offset="70%" stop-color="#b8860b"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff8dc" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#d4af37" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="outerGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="rounded">
      <rect width="512" height="512" rx="110" ry="110"/>
    </clipPath>
  </defs>

  <!-- Background with clip -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>

  <!-- Subtle purple inner glow ring -->
  <rect width="512" height="512" rx="110" ry="110" fill="none" stroke="rgba(108,92,231,0.18)" stroke-width="2"/>

  <!-- Ambient glow behind K -->
  <ellipse cx="256" cy="265" rx="130" ry="110" fill="rgba(180,140,255,0.07)" filter="url(#outerGlow)"/>

  <!-- ═══ Letter K — custom path, centered & proportional ═══ -->
  <!-- Left vertical stroke of K -->
  <rect x="147" y="130" width="52" height="252" rx="10" fill="url(#gold)" filter="url(#glow)"/>

  <!-- K upper diagonal arm -->
  <path d="M 196 256 L 340 130 L 366 152 L 220 270 Z" fill="url(#gold)" filter="url(#glow)"/>

  <!-- K lower diagonal arm -->
  <path d="M 196 256 L 366 360 L 340 382 L 220 242 Z" fill="url(#gold)" filter="url(#glow)"/>

  <!-- Gold shine highlight on K vertical -->
  <rect x="147" y="130" width="52" height="252" rx="10" fill="url(#goldShine)"/>

  <!-- Thin gold decorative line below K -->
  <rect x="147" y="406" width="218" height="3" rx="2" fill="rgba(212,175,55,0.5)"/>

  <!-- Corner accent dots -->
  <circle cx="256" cy="96" r="5" fill="rgba(212,175,55,0.4)"/>
</svg>
